default: &default
  adapter: postgresql
  host: <%= ENV.fetch("DATABASE_HOST") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 16 } %>
  timeout: 5000
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  encoding: unicode

development:
  <<: *default
  username: <%= ENV.fetch("DEV_DATABASE_USERNAME", "") %>
  password: <%= ENV.fetch("DEV_DATABASE_PASSWORD", "") %>
  database: <%= ENV.fetch("DEV_DATABASE_NAME", "railway") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  username: <%= ENV.fetch("TEST_DATABASE_USERNAME", "") %>
  password: <%= ENV.fetch("TEST_DATABASE_PASSWORD", "") %>
  database: <%= ENV.fetch("TEST_DATABASE_NAME", "template_test") %>

production:
  <<: *default
  username: <%= ENV.fetch("PRD_DATABASE_USERNAME", "") %>
  password: <%= ENV.fetch("PRD_DATABASE_PASSWORD", "") %>
  database: <%= ENV.fetch("PRD_DATABASE_NAME", "template_production") %>
